name: MLOps Pipeline

on:
  workflow_dispatch:

jobs:

  ci_tests_quality:
    name: CI - Tests and Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest black flake8 isort

      - name: Run flake8 (only src/)
        run: flake8 src

      - name: Run black check
        run: black --check src

      - name: Run isort check
        run: isort src --check-only

      - name: Run tests
        run: pytest

  build_and_push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: ci_tests_quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/airquality-mlops:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/airquality-mlops:latest

  deploy_to_vm:
    name: CD - Deploy to VM
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/airquality-mlops:latest
            docker stop airquality || true
            docker rm airquality || true
            docker run -d --name airquality -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/airquality-mlops:latest
