name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_REPO }}/airquality-api:latest .

      - name: Login to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_REPO }}/airquality-api:latest

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: pamela_business
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            docker pull ${{ secrets.DOCKER_REPO }}/airquality-api:latest || true

            docker stop airquality-api || true
            docker rm airquality-api || true

            docker run -d \
              --name airquality-api \
              -p 5000:5000 \
              ${{ secrets.DOCKER_REPO }}/airquality-api:latest
