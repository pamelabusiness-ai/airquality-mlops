apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airquality-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pamelabusiness-ai/airquality-mlops.git
    path: k8s
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
